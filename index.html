<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kyle Mogged</title>
    <meta
      name="description"
      content="Kyle Mogged — get in touch."
    />

    <!-- Poiret One: the Trailer Club display wordmark face -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --black: #0a0a0d;
        --black-2: #121016;
        --gold: #e5b53c;
        --gold-bright: #f5d77c;
        --gold-deep: #b8901f;
        --purple: #7c3aed;
        --purple-bright: #a855f7;
        --cream: #f3eee2;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background: var(--black);
        color: var(--cream);
        font-family: "Poiret One", system-ui, sans-serif;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }

      /* ---- Black upper section: portrait → epithet ---- */
      .stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: clamp(1.5rem, 4vw, 3rem) 1.25rem clamp(2rem, 5vw, 3.5rem);
      }

      /* ---- Purple lower section: starts at "Get in touch" ---- */
      .contact-panel {
        flex: 1 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: clamp(2.25rem, 5vw, 3.5rem) 1.25rem clamp(2rem, 5vw, 3rem);
        background:
          radial-gradient(
            120% 90% at 50% 0%,
            rgba(124, 58, 237, 0.35) 0%,
            transparent 70%
          ),
          linear-gradient(180deg, #1c1233 0%, #150d27 100%);
      }

      /* ---- Wordmark ---- */
      .wordmark {
        font-size: clamp(2.4rem, 9vw, 5.5rem);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        line-height: 1;
        padding-left: 0.18em; /* optical centering for letter-spacing */
        background: linear-gradient(
          180deg,
          var(--gold-bright) 0%,
          var(--gold) 45%,
          var(--gold-deep) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 2px 18px rgba(124, 58, 237, 0.35));
      }

      .deco-rule {
        width: min(420px, 78vw);
        height: 1px;
        margin: 0 auto;
        background-image: linear-gradient(
          to right,
          transparent,
          var(--gold) 20%,
          var(--purple-bright) 50%,
          var(--gold) 80%,
          transparent
        );
      }

      .stage {
        gap: clamp(1.25rem, 3.5vw, 2.25rem);
      }

      .portrait-wrap {
        position: relative;
        display: inline-block;
      }

      .portrait-wrap::before {
        content: "";
        position: absolute;
        inset: -8% -6% -2%;
        background: radial-gradient(
          50% 50% at 50% 55%,
          rgba(124, 58, 237, 0.45) 0%,
          rgba(168, 85, 247, 0.18) 40%,
          transparent 72%
        );
        filter: blur(6px);
        z-index: 0;
      }

      .portrait {
        position: relative;
        z-index: 1;
        width: clamp(220px, 42vw, 360px);
        height: auto;
        display: block;
        filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.6));
      }

      /* The signature PNG is a 2000x2000 square with the ink occupying only
         the middle band (~18% empty top, ~18% empty bottom). Crop to the ink
         bounds so it sits tight under the wordmark instead of overflowing. */
      .sig-wrap {
        width: clamp(220px, 46vw, 360px);
        aspect-ratio: 1000 / 639;
        overflow: hidden;
        display: block;
      }

      .signature {
        width: 100%;
        height: auto;
        display: block;
        margin-top: -18%; /* lift the empty top band out of view */
        /* PNG is black ink on white — invert to white ink, then screen
           drops the (now black) background against the dark page. */
        filter: invert(1)
          drop-shadow(0 0 14px rgba(229, 181, 60, 0.25));
        mix-blend-mode: screen;
      }

      /* ---- Epithet ---- */
      .title {
        font-size: clamp(1.3rem, 5vw, 2.1rem);
        letter-spacing: 0.34em;
        text-transform: uppercase;
        padding-left: 0.34em; /* optical centering for letter-spacing */
        margin-top: -0.25rem;
        background: linear-gradient(
          180deg,
          var(--purple-bright) 0%,
          var(--gold) 120%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 1px 12px rgba(124, 58, 237, 0.4));
      }

      /* ---- Get in touch ---- */
      .contact {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.85rem;
        max-width: 100%;
      }

      .contact h2 {
        font-size: clamp(1.1rem, 3.5vw, 1.6rem);
        font-weight: 400;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--gold);
        padding-left: 0.3em;
      }

      .email {
        display: inline-block;
        max-width: 100%;
        font-size: clamp(0.95rem, 4vw, 1.5rem);
        letter-spacing: 0.06em;
        color: var(--cream);
        text-decoration: none;
        padding: 0.7em 1.4em;
        border: 1px solid rgba(229, 181, 60, 0.55);
        border-radius: 999px;
        background: rgba(10, 8, 15, 0.4);
        transition:
          border-color 0.25s ease,
          box-shadow 0.25s ease,
          color 0.25s ease,
          transform 0.25s ease;
      }

      .email:hover,
      .email:focus-visible {
        color: var(--gold-bright);
        border-color: var(--gold);
        box-shadow:
          0 0 0 1px rgba(229, 181, 60, 0.4),
          0 8px 30px rgba(124, 58, 237, 0.35);
        transform: translateY(-2px);
        outline: none;
      }

      footer {
        margin-top: auto;
        padding-top: clamp(2.5rem, 6vw, 4rem);
        font-size: 0.8rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: rgba(243, 238, 226, 0.5);
      }
    </style>
  </head>

  <body>
    <main class="stage">
      <div class="portrait-wrap">
        <img
          class="portrait"
          src="./Media/Kyle_M_30_Profile_Picture_Transparent.PNG"
          alt="Kyle Mogged"
          width="360"
        />
      </div>

      <div class="deco-rule" role="presentation"></div>

      <h1 class="wordmark">Kyle Mogged</h1>

      <div class="sig-wrap">
        <img
          class="signature"
          src="./Media/Kyle_M_31_Signature_Black.PNG"
          alt="Kyle Mogged signature"
          width="360"
        />
      </div>

      <p class="title">The Zen Wizard</p>
    </main>

    <section class="contact-panel">
      <div class="contact">
        <h2>Get in touch</h2>
        <a class="email" href="mailto:kyle@kylemogged.com"
          >kyle@kylemogged.com</a
        >
      </div>

      <footer>Audio Alchemy Collective</footer>
    </section>
  </body>
</html>
